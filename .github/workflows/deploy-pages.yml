name: Build and publish cricket schedule

# Publishes the built static app into the cricket/ folder on main, which
# GitHub Pages serves via its branch-based deployment ("deploy from a
# branch") — the same pipeline that serves the rest of this repository.
# This is deliberately the ONLY deployment path for the cricket app:
# a previous Actions-based deployment (actions/deploy-pages) raced the
# branch-based one and each intermittently broke the other.

on:
  push:
    branches: [main]
    paths: ["cricket-schedule/**", ".github/workflows/deploy-pages.yml"]
  schedule:
    # Refresh fixture data roughly every 48 hours.
    - cron: "0 3 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cricket-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Fail fast and loudly rather than hanging (a stuck deployment once sat
    # 15 minutes in "waiting" before being cancelled).
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cricket-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cricket-schedule/package-lock.json
      - run: npm ci
      - name: Generate fixture data
        run: npm run generate:fixtures
        env:
          # Accept the key under either name, as a secret or a variable
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY || secrets.CRIC_KEY || vars.CRICAPI_KEY || vars.CRIC_KEY }}
          # Quality gate baseline: the currently committed dataset. Every
          # published dataset is a git commit, so rollback = git revert.
          PREVIOUS_FIXTURES_FILE: ${{ github.workspace }}/cricket/fixtures.json
      - name: Build static site
        run: |
          rm -rf src/app/api  # Request-dependent route handlers are unsupported in static export
          npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_DATA: "1"
          NEXT_PUBLIC_BASE_PATH: /Leo26/cricket
      - name: Publish into cricket/ and push
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf cricket
          mkdir cricket
          cp -r cricket-schedule/out/. cricket/
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cricket
          if git diff --cached --quiet; then
            echo "No site changes — nothing to publish."
          else
            git commit -m "chore: publish cricket schedule site $(date -u +%Y-%m-%d)"
            # The daily Leopold refresh also pushes to main; rebase to avoid races.
            git pull --rebase origin main
            git push
          fi
