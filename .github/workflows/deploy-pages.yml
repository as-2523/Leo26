name: Deploy cricket-schedule to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["cricket-schedule/**", ".github/workflows/deploy-pages.yml"]
  schedule:
    # Refresh fixture data roughly every 48 hours.
    - cron: "0 3 */2 * *"
  workflow_dispatch:
    inputs:
      restore_run_id:
        description: "Recovery: workflow run ID whose published fixtures.json should seed the quality gate"
        required: false

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # github-pages environment so environment-level secrets are visible too
    environment: github-pages
    defaults:
      run:
        working-directory: cricket-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cricket-schedule/package-lock.json
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Fetch currently published data (for the quality gate)
        run: curl -fsSL "https://as-2523.github.io/Leo26/fixtures.json" -o /tmp/previous-fixtures.json || true
      - name: Restore data from a previous run's artifact (manual recovery)
        if: ${{ github.event.inputs.restore_run_id }}
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          run-id: ${{ github.event.inputs.restore_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/restore
      - name: Use restored fixtures as the quality-gate baseline
        if: ${{ github.event.inputs.restore_run_id }}
        run: |
          tar -xf /tmp/restore/artifact.tar -C /tmp/restore ./fixtures.json
          cp /tmp/restore/fixtures.json /tmp/previous-fixtures.json
      - name: Generate fixture data
        run: npm run generate:fixtures
        env:
          # Accept the key under either name, as a secret or a variable
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY || secrets.CRIC_KEY || vars.CRICAPI_KEY || vars.CRIC_KEY }}
          PREVIOUS_FIXTURES_FILE: /tmp/previous-fixtures.json
      - name: Build static site
        run: |
          rm -rf src/app/api  # Request-dependent route handlers are unsupported in static export
          npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_DATA: "1"
          NEXT_PUBLIC_BASE_PATH: /Leo26
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cricket-schedule/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
